<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>競馬単勝オッズ予測エンジンの構築プロセス</title>
    <!-- Marked.js for Markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']]
            },
            svg: {
                fontCache: 'global'
            }
        };
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-mml-chtml.min.js"></script>
    <!-- Highlight.js for syntax highlighting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: row;
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            background-color: #fff;
        }

        /* Mobile Header */
        #mobile-header {
            display: none;
            background: #f6f8fa;
            border-bottom: 1px solid #e1e4e8;
            padding: 12px 20px;
            align-items: center;
            justify-content: space-between;
            z-index: 1000;
            flex-shrink: 0;
        }

        .mobile-title {
            font-weight: bold;
            color: #24292e;
            font-size: 1.2em;
        }

        #menu-toggle {
            background: #24292e;
            color: #fff;
            border: none;
            border-radius: 4px;
            padding: 6px 12px;
            cursor: pointer;
            font-size: 14px;
        }

        /* Sidebar styling */
        #sidebar {
            width: 320px;
            background: #f6f8fa;
            border-right: 1px solid #e1e4e8;
            overflow-y: auto;
            padding: 20px 10px;
            box-sizing: border-box;
            flex-shrink: 0;
            transition: max-height 0.3s ease-in-out, padding 0.3s ease-in-out, opacity 0.2s;
        }

        #sidebar h2 {
            font-size: 1.2em;
            color: #24292e;
            margin-top: 0;
            padding-bottom: 10px;
            border-bottom: 1px solid #e1e4e8;
            text-align: center;
        }

        .chapter {
            margin-bottom: 12px;
        }


        .chapter-title {
            font-weight: 600;
            font-size: 0.95em;
            color: #586069;
            margin-bottom: 4px;
            padding-left: 8px;
        }

        .file-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .file-list li {
            margin: 2px 0;
        }

        .file-list a {
            text-decoration: none;
            color: #0366d6;
            font-size: 0.9em;
            display: block;
            padding: 6px 8px;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .file-list a:hover {
            background: #eaecef;
        }

        .file-list a.active {
            background: #0366d6;
            color: #fff;
            font-weight: 600;
        }

        /* Content area styling */
        #content-wrapper {
            flex: 1;
            overflow-y: auto;
            padding: 40px;
            box-sizing: border-box;
        }

        #content {
            max-width: 860px;
            margin: 0 auto;
            line-height: 1.7;
            color: #24292e;
            font-size: 16px;
            padding-bottom: 100px;
        }

        /* Markdown generated HTML styles */
        #content h1 {
            font-size: 2em;
            border-bottom: 1px solid #eaecef;
            padding-bottom: 0.3em;
            margin-top: 0;
        }

        #content h2 {
            font-size: 1.5em;
            border-bottom: 1px solid #eaecef;
            padding-bottom: 0.3em;
            margin-top: 24px;
        }

        #content h3 {
            font-size: 1.25em;
            margin-top: 24px;
        }

        #content p {
            margin-top: 0;
            margin-bottom: 16px;
        }

        #content code {
            font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, Liberation Mono, monospace;
            font-size: 85%;
            background-color: rgba(27, 31, 35, 0.05);
            border-radius: 3px;
            padding: 0.2em 0.4em;
        }

        #content pre {
            background-color: #f6f8fa;
            border-radius: 6px;
            padding: 16px;
            overflow: auto;
            line-height: 1.45;
            font-size: 85%;
            border: 1px solid #e1e4e8;
        }

        #content pre code {
            background-color: transparent;
            padding: 0;
            border: 0;
        }

        #content blockquote {
            padding: 0 1em;
            color: #6a737d;
            border-left: 0.25em solid #dfe2e5;
            margin: 0 0 16px 0;
        }

        #content img {
            max-width: 100%;
            box-sizing: content-box;
            border-radius: 6px;
        }

        #content table {
            border-spacing: 0;
            border-collapse: collapse;
            margin-bottom: 16px;
            width: 100%;
        }

        #content th,
        #content td {
            padding: 6px 13px;
            border: 1px solid #dfe2e5;
        }

        #content th {
            font-weight: 600;
            background-color: #f6f8fa;
        }

        #content hr {
            height: 0.25em;
            padding: 0;
            margin: 24px 0;
            background-color: #e1e4e8;
            border: 0;
        }

        .loading {
            text-align: center;
            color: #586069;
            padding: 50px;
            font-style: italic;
        }

        .error {
            color: #cb2431;
            background-color: #ffeef0;
            padding: 20px;
            border-radius: 6px;
            border: 1px solid #f8aab1;
        }

        /* Navigation buttons */
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #e1e4e8;
        }

        .nav-button {
            padding: 10px 20px;
            background: #f6f8fa;
            border: 1px solid #e1e4e8;
            border-radius: 6px;
            color: #0366d6;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            flex: 1;
            text-align: center;
            margin: 0 10px;
        }

        .nav-button:hover {
            background: #eaecef;
        }

        .nav-button.disabled {
            color: #959da5;
            pointer-events: none;
            background: #fafbfc;
            opacity: 0.6;
        }

        /* Mobile responsiveness - Accordion style */
        @media screen and (max-width: 768px) {
            body {
                flex-direction: column;
            }

            #mobile-header {
                display: flex;
            }

            #sidebar h2 {
                display: none;
                margin-bottom: 0;
            }

            #sidebar {
                width: 100%;
                border-right: none;
                max-height: 0;
                padding-top: 0;
                padding-bottom: 0;
                overflow: hidden;
                opacity: 0;
            }

            #sidebar.open {
                max-height: 60vh;
                padding-top: 15px;
                padding-bottom: 15px;
                opacity: 1;
                border-bottom: 1px solid #e1e4e8;
                overflow-y: auto;
            }

            #content-wrapper {
                padding: 20px 15px;
            }
        }
    </style>
</head>

<body>

    <div id="mobile-header">
        <span class="mobile-title">オッズ予測エンジン</span>
        <button id="menu-toggle">≡ メニュー</button>
    </div>

    <div id="sidebar">
        <h2>オッズ予測エンジン<br><span style="font-size: 0.6em; color: #586069;">モデル構築プロセスの解説</span></h2>
        <div id="nav-container"></div>
    </div>

    <div id="content-wrapper">
        <div id="content">
            <div id="markdown-container">
                <div style="text-align: center; margin-top: 100px; color: #586069;">
                    <h2>左側のメニューからセクションを選択してください</h2>
                    <p>※注意: ローカルファイルからアクセスしている場合、ブラウザのセキュリティ制限(CORS)によりファイルが読み込めないことがあります。<br>その場合は
                        <code>python3 -m http.server</code> などのローカルサーバー経由で開いてください。
                    </p>
                </div>
            </div>
            <div id="bottom-nav" class="nav-buttons" style="display: none;">
                <a id="prev-btn" class="nav-button">← 前へ</a>
                <a id="next-btn" class="nav-button">次へ →</a>
            </div>
        </div>
    </div>

    <script>
        // Configure marked.js to use highlight.js for code blocks
        marked.setOptions({
            highlight: function (code, lang) {
                const language = hljs.getLanguage(lang) ? lang : 'plaintext';
                return hljs.highlight(code, { language }).value;
            },
            langPrefix: 'hljs language-'
        });

        // Define the chapters and files
        const TOC = [
            {
                title: "目次",
                files: [
                    { id: "HOWTOMAKE", name: "全体のインデックスとサマリー" }
                ]
            },
            {
                title: "序章",
                files: [
                    { id: "HOWTOMAKE_0", name: "競馬オッズの課題とアプローチ選定" }
                ]
            },
            {
                title: "モデル開発プロセス",
                files: [
                    { id: "HOWTOMAKE_1", name: "第1段階: 基礎属性のベースライン" },
                    { id: "HOWTOMAKE_2", name: "第2段階: 払戻率80%ルールの導入" },
                    { id: "HOWTOMAKE_3", name: "第3段階: コース適性と物理指数" },
                    { id: "HOWTOMAKE_4", name: "第4段階: 人間心理とバイアス" },
                    { id: "HOWTOMAKE_5", name: "第5段階: 対数領域とキャリブレーション" },
                    { id: "HOWTOMAKE_6", name: "第6段階: バックテストと最適化" }
                ]
            },
            {
                title: "アーキテクチャ",
                files: [
                    { id: "HOWTOMAKE_7", name: "第7段階: 運用への再構築と永続化" }
                ]
            }
        ];

        // Flatten TOC for navigation
        const flatFiles = [];
        TOC.forEach(chapter => {
            chapter.files.forEach(file => {
                flatFiles.push(file);
            });
        });

        // 1. Render Sidebar
        const navContainer = document.getElementById('nav-container');
        TOC.forEach(chapter => {
            const chapDiv = document.createElement('div');
            chapDiv.className = 'chapter';

            const chapTitle = document.createElement('div');
            chapTitle.className = 'chapter-title';
            chapTitle.textContent = chapter.title;
            chapDiv.appendChild(chapTitle);

            const ul = document.createElement('ul');
            ul.className = 'file-list';

            chapter.files.forEach(file => {
                const li = document.createElement('li');
                const a = document.createElement('a');
                a.textContent = file.name;
                a.setAttribute('data-id', file.id);
                a.onclick = (e) => loadMarkdown(file.id, e.target);
                li.appendChild(a);
                ul.appendChild(li);
            });

            chapDiv.appendChild(ul);
            navContainer.appendChild(chapDiv);
        });

        // 2. Load Markdown File
        async function loadMarkdown(fileId, linkElement) {
            // Update active state in sidebar
            document.querySelectorAll('.file-list a').forEach(a => a.classList.remove('active'));
            if (linkElement) {
                linkElement.classList.add('active');
            } else {
                const activeLink = document.querySelector(`a[data-id="${fileId}"]`);
                if (activeLink) activeLink.classList.add('active');
            }

            // Close mobile menu accordion
            const sidebar = document.getElementById('sidebar');
            if (sidebar.classList.contains('open')) {
                sidebar.classList.remove('open');
            }

            const mdContainer = document.getElementById('markdown-container');
            const bottomNav = document.getElementById('bottom-nav');
            mdContainer.innerHTML = '<div class="loading">ファイルを読み込み中...</div>';
            bottomNav.style.display = 'none';

            try {
                // Fetch the Markdown file
                const response = await fetch(`./${fileId}.md`);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const markdownText = await response.text();

                // Format markdown to preserve MathJax blocks before parsing
                let preprocessedText = markdownText;

                // Parse and render
                mdContainer.innerHTML = marked.parse(preprocessedText);

                // Intercept markdown links to stay in the viewer
                mdContainer.querySelectorAll('a').forEach(a => {
                    const href = a.getAttribute('href');
                    if (href && href.endsWith('.md') && !href.startsWith('http')) {
                        a.addEventListener('click', (e) => {
                            e.preventDefault();
                            const fileId = href.replace('.md', '');
                            loadMarkdown(fileId);
                        });
                    }
                });

                // Re-process MathJax if it's available
                if (window.MathJax) {
                    MathJax.typesetPromise([mdContainer]).catch(function (err) {
                        console.error('MathJax error: ', err.message);
                    });
                }

                // Update navigation buttons
                updateBottomNav(fileId);
                bottomNav.style.display = 'flex';

                // Scroll to top
                document.getElementById('content-wrapper').scrollTop = 0;
            } catch (error) {
                mdContainer.innerHTML = `
                    <div class="error">
                        <h3>読み込みエラー</h3>
                        <p>ファイル <code>${fileId}.md</code> の読み込みに失敗しました。</p>
                        <p>理由: ${error.message}</p>
                        <p><strong>CORSエラーの場合:</strong> ローカルファイル (file://) から直接開いていると、セキュリティポリシーにより他のファイルを読み込めません。<br>
                        ターミナルで <code>python3 -m http.server</code> を実行し、<code>http://localhost:8000/index.html</code> にアクセスしてください。</p>
                    </div>
                `;
            }
        }

        // Navigation update function
        function updateBottomNav(currentId) {
            const currentIndex = flatFiles.findIndex(f => f.id === currentId);
            const prevBtn = document.getElementById('prev-btn');
            const nextBtn = document.getElementById('next-btn');

            if (currentIndex > 0) {
                const prevFile = flatFiles[currentIndex - 1];
                prevBtn.classList.remove('disabled');
                prevBtn.onclick = () => loadMarkdown(prevFile.id);
                prevBtn.innerHTML = `&larr; 前ページ<br><span style="font-size: 0.8em; font-weight: normal; color: #586069;">${prevFile.name}</span>`;
            } else {
                prevBtn.classList.add('disabled');
                prevBtn.onclick = null;
                prevBtn.innerHTML = `&larr; 前ページ`;
            }

            if (currentIndex < flatFiles.length - 1) {
                const nextFile = flatFiles[currentIndex + 1];
                nextBtn.classList.remove('disabled');
                nextBtn.onclick = () => loadMarkdown(nextFile.id);
                nextBtn.innerHTML = `次ページ &rarr;<br><span style="font-size: 0.8em; font-weight: normal; color: #586069;">${nextFile.name}</span>`;
            } else {
                nextBtn.classList.add('disabled');
                nextBtn.onclick = null;
                nextBtn.innerHTML = `次ページ &rarr;`;
            }
        }

        // 3. Load first file on startup or handle hash
        window.onload = () => {
            const defaultId = TOC[0].files[0].id;
            const firstLink = document.querySelector(`a[data-id="${defaultId}"]`);
            loadMarkdown(defaultId, firstLink);
        };

        // 4. Mobile Menu Toggle Logic
        document.getElementById('menu-toggle').addEventListener('click', () => {
            document.getElementById('sidebar').classList.toggle('open');
        });
    </script>
</body>

</html>
